<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me - 3D Text Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@900&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════════════════
           CSS VARIABLES - Customize here for theme adjustments
           ═══════════════════════════════════════════════════════════════ */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #f5f0e8;
            --accent-primary: #00cfff;
            --accent-secondary: #ff2d78;
            --depth-layers: 16px;
            --depth-shadow: rgba(0, 0, 0, 0.8);
            --entrance-duration: 700ms;
            --entrance-delay: 70ms;
            --float-duration: 4s;
            --parallax-max-x: 20deg;
            --parallax-max-y: 15deg;
            --float-amplitude-y: 10px;
            --float-amplitude-x: 4deg;
            --float-amplitude-z: 3deg;
            --hover-scale: 1.3;
            --hover-translatez: 40px;
            --neighbor-scale: 1.1;
            --neighbor-translatez: 20px;
            --transition-duration: 200ms;
            --font-size: clamp(3rem, 12vw, 9rem);
        }

        /* ═══════════════════════════════════════════════════════════════
           BASE STYLES & RESET
           ═══════════════════════════════════════════════════════════════ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
            color: var(--text-primary);
            cursor: default;
        }

        /* ═══════════════════════════════════════════════════════════════
           3D TEXT WRAPPER - Perspective & Transform Container
           ═══════════════════════════════════════════════════════════════ */
        .text-wrapper {
            perspective: 800px;
            transform-style: preserve-3d;
            position: relative;
            padding: 40px;
            will-change: transform;
        }

        .text-container {
            position: relative;
            display: inline-block;
            font-size: var(--font-size);
            font-weight: 900;
            letter-spacing: -0.02em;
            transform-style: preserve-3d;
            will-change: transform;
            /* Ambient bloom glow */
            filter: drop-shadow(0 0 40px rgba(0, 207, 255, 0.3));
        }

        /* ═══════════════════════════════════════════════════════════════
           LETTER STYLES - Individual 3D Transform & Depth Layering
           ═══════════════════════════════════════════════════════════════ */
        .letter {
            display: inline-block;
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
            transition: all var(--transition-duration) cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            user-select: none;

            /* 3D Depth Effect via Layered Text-Shadow */
            /* Top face (bright), mid faces (gradient), shadow face (dark) */
            text-shadow:
                /* Layer 1-2: Bright highlights (top face) */
                1px 1px 0 var(--text-secondary),
                2px 2px 0 rgba(255, 255, 255, 0.15),
                /* Layer 3-6: Mid tones (side faces) */
                3px 3px 0 rgba(200, 200, 200, 0.4),
                4px 4px 0 rgba(180, 180, 180, 0.35),
                5px 5px 0 rgba(160, 160, 160, 0.3),
                6px 6px 0 rgba(140, 140, 140, 0.25),
                /* Layer 7-14: Depth progression */
                7px 7px 0 rgba(120, 120, 120, 0.2),
                8px 8px 0 rgba(100, 100, 100, 0.18),
                9px 9px 0 rgba(80, 80, 80, 0.16),
                10px 10px 0 rgba(60, 60, 60, 0.14),
                11px 11px 0 rgba(40, 40, 40, 0.12),
                12px 12px 0 rgba(20, 20, 20, 0.1),
                13px 13px 0 rgba(10, 10, 10, 0.08),
                14px 14px 0 rgba(0, 0, 0, 0.06),
                /* Layer 15-16: Shadow foundation */
                15px 15px 8px rgba(0, 0, 0, 0.5),
                16px 16px 12px rgba(0, 0, 0, 0.3);

            /* Specular highlight: inset glow */
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.08) 0%,
                transparent 60%
            );
            -webkit-background-clip: text;
            background-clip: text;

            color: var(--text-primary);
            animation: letterEntrance var(--entrance-duration) ease-out forwards;
        }

        /* Per-letter animation delay via CSS custom property */
        .letter {
            animation-delay: var(--delay);
        }

        /* ═══════════════════════════════════════════════════════════════
           ENTRANCE ANIMATION - Staggered Drop-In with Spring
           ═══════════════════════════════════════════════════════════════ */
        @keyframes letterEntrance {
            from {
                opacity: 0;
                transform: translateY(-120px) rotateX(90deg) scale(0.6);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0deg) scale(1);
            }
        }

        /* Springy easing for entrance */
        .letter {
            animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ═══════════════════════════════════════════════════════════════
           IDLE FLOAT LOOP - Gentle Oscillating Motion
           ═══════════════════════════════════════════════════════════════ */
        @keyframes floatLoop {
            0%, 100% {
                transform: translateY(0) rotateX(0deg) rotateY(0deg);
            }
            50% {
                transform: translateY(var(--float-amplitude-y))
                           rotateX(var(--float-amplitude-x))
                           rotateY(var(--float-amplitude-z));
            }
        }

        .letter {
            animation: letterEntrance var(--entrance-duration) ease-out forwards,
                       floatLoop var(--float-duration) ease-in-out var(--float-delay) infinite;
        }

        /* ═══════════════════════════════════════════════════════════════
           HOVER EFFECTS - Per-Letter & Neighboring Ripple
           ═══════════════════════════════════════════════════════════════ */
        .letter:hover {
            color: var(--accent-primary);
            transform: scale(var(--hover-scale))
                       translateZ(var(--hover-translatez))
                       rotateY(15deg);
            text-shadow:
                1px 1px 0 var(--accent-primary),
                2px 2px 0 rgba(0, 207, 255, 0.25),
                3px 3px 0 rgba(0, 207, 255, 0.2),
                4px 4px 0 rgba(0, 207, 255, 0.15),
                5px 5px 0 rgba(0, 207, 255, 0.1),
                6px 6px 0 rgba(0, 207, 255, 0.08),
                7px 7px 0 rgba(0, 207, 255, 0.06),
                8px 8px 0 rgba(0, 207, 255, 0.04),
                9px 9px 8px rgba(0, 207, 255, 0.3),
                10px 10px 12px rgba(0, 207, 255, 0.2);
            filter: drop-shadow(0 0 60px rgba(0, 207, 255, 0.5));
        }

        .letter.neighbor {
            color: var(--text-primary);
            transform: scale(var(--neighbor-scale))
                       translateZ(var(--neighbor-translatez));
        }

        /* ═══════════════════════════════════════════════════════════════
           RESPONSIVE - Mobile Touch Support
           ═══════════════════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            .text-wrapper {
                padding: 20px;
            }

            /* Disable mouse parallax on touch devices */
            body.touch-device .text-container {
                transform: none !important;
            }
        }

        /* ═══════════════════════════════════════════════════════════════
           SCANLINE TEXTURE OVERLAY - Optional Tactile Effect
           ═══════════════════════════════════════════════════════════════ */
        .text-wrapper::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.02) 0px,
                rgba(255, 255, 255, 0.02) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="text-wrapper">
        <div class="text-container" id="textContainer">
            <!-- Letters will be dynamically inserted here -->
        </div>
    </div>

    <script>
        /* ═══════════════════════════════════════════════════════════════
           CONFIGURATION & STATE
           ═══════════════════════════════════════════════════════════════ */
        const TEXT = 'About Me';
        const config = {
            textContent: TEXT,
            entranceDuration: 700,
            entranceDelay: 70,
            floatDuration: 4000,
            parallaxMaxX: 20,
            parallaxMaxY: 15,
            lerpFactor: 0.08,
            neighborDistance: 2,
        };

        let state = {
            mouseX: 0,
            mouseY: 0,
            rotateX: 0,
            rotateY: 0,
            targetRotateX: 0,
            targetRotateY: 0,
            isTouchDevice: false,
        };

        /* ═══════════════════════════════════════════════════════════════
           INITIALIZATION - Create Letter Elements
           ═══════════════════════════════════════════════════════════════ */
        function initializeLetters() {
            const container = document.getElementById('textContainer');
            const letters = TEXT.split('');

            letters.forEach((char, index) => {
                const letter = document.createElement('span');
                letter.className = 'letter';
                letter.textContent = char;
                letter.dataset.index = index;

                // Set CSS custom properties for animation delay & float phase offset
                const delayMs = index * config.entranceDelay;
                const floatDelayMs = index * 300;
                letter.style.setProperty('--delay', `${delayMs}ms`);
                letter.style.setProperty('--float-delay', `${floatDelayMs}ms`);

                // Add mouse enter/leave listeners for hover ripple effect
                letter.addEventListener('mouseenter', () => handleLetterHover(index));
                letter.addEventListener('mouseleave', () => handleLetterUnhover(index));

                // Touch support: tap to trigger hover effect
                letter.addEventListener('touchstart', () => handleLetterHover(index));
                letter.addEventListener('touchend', () => {
                    setTimeout(() => handleLetterUnhover(index), 500);
                });

                container.appendChild(letter);
            });
        }

        /* ═══════════════════════════════════════════════════════════════
           HOVER RIPPLE EFFECT - Scale Neighbors
           ═══════════════════════════════════════════════════════════════ */
        function handleLetterHover(index) {
            const letters = document.querySelectorAll('.letter');

            letters.forEach((letter, i) => {
                const distance = Math.abs(i - index);
                if (distance > 0 && distance <= config.neighborDistance) {
                    letter.classList.add('neighbor');
                }
            });
        }

        function handleLetterUnhover(index) {
            const letters = document.querySelectorAll('.letter');
            letters.forEach((letter) => {
                letter.classList.remove('neighbor');
            });
        }

        /* ═══════════════════════════════════════════════════════════════
           MOUSE TRACKING & PARALLAX - 3D Tilt Effect
           ═══════════════════════════════════════════════════════════════ */
        function handleMouseMove(event) {
            if (state.isTouchDevice) return;

            const { clientX, clientY } = event;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            // Normalize mouse position to [-1, 1] range
            const normalizedX = (clientX - centerX) / centerX;
            const normalizedY = (clientY - centerY) / centerY;

            // Map to rotation angles
            state.targetRotateY = normalizedX * config.parallaxMaxX;
            state.targetRotateX = -normalizedY * config.parallaxMaxY;
        }

        /* ═══════════════════════════════════════════════════════════════
           LERP INTERPOLATION - Smooth Animation Loop
           ═══════════════════════════════════════════════════════════════ */
        function lerp(start, end, factor) {
            return start + (end - start) * factor;
        }

        function animationLoop() {
            // Smoothly interpolate toward target rotation
            state.rotateX = lerp(state.rotateX, state.targetRotateX, config.lerpFactor);
            state.rotateY = lerp(state.rotateY, state.targetRotateY, config.lerpFactor);

            // Apply transform to text container
            const textContainer = document.getElementById('textContainer');
            textContainer.style.transform = `rotateX(${state.rotateX}deg) rotateY(${state.rotateY}deg)`;

            requestAnimationFrame(animationLoop);
        }

        /* ═══════════════════════════════════════════════════════════════
           TOUCH DEVICE DETECTION
           ═══════════════════════════════════════════════════════════════ */
        function detectTouchDevice() {
            const isTouchSupported = () => {
                return (
                    (typeof window !== 'undefined' &&
                        ('ontouchstart' in window ||
                            (window.DocumentTouch &&
                                typeof document !== 'undefined' &&
                                document instanceof window.DocumentTouch))) ||
                    (typeof navigator !== 'undefined' &&
                        (navigator.maxTouchPoints > 0 ||
                            navigator.msMaxTouchPoints > 0))
                );
            };

            state.isTouchDevice = isTouchSupported();

            if (state.isTouchDevice) {
                document.body.classList.add('touch-device');
            }
        }

        /* ═══════════════════════════════════════════════════════════════
           INITIALIZATION - Wire Up Event Listeners
           ═══════════════════════════════════════════════════════════════ */
        function initialize() {
            detectTouchDevice();
            initializeLetters();

            // Mouse tracking (disabled on touch devices)
            if (!state.isTouchDevice) {
                document.addEventListener('mousemove', handleMouseMove);
            }

            // Start animation loop
            animationLoop();

            // Optional: Reset rotation on mouse leave
            document.addEventListener('mouseleave', () => {
                state.targetRotateX = 0;
                state.targetRotateY = 0;
            });
        }

        /* ═══════════════════════════════════════════════════════════════
           START ON DOM READY
           ═══════════════════════════════════════════════════════════════ */
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initialize);
        } else {
            initialize();
        }
    </script>
</body>
</html>
