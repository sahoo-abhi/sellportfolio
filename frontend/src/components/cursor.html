<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Trail</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
  html, body { width: 100%; height: 100%; background: #03030e; overflow: hidden; }
  canvas { display: block; position: fixed; inset: 0; }
  #hint {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Georgia', serif;
    font-size: clamp(0.85rem, 2vw, 1rem);
    font-weight: 400;
    letter-spacing: 0.45em;
    color: rgba(255,255,255,0.12);
    pointer-events: none;
    transition: opacity 1.5s ease;
    text-transform: uppercase;
    white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Move through the stars</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  makeBgStars();
}

// ── Background starfield ──
const bgStars = [];
function makeBgStars() {
  bgStars.length = 0;
  const count = Math.floor((W * H) / 6000);
  for (let i = 0; i < count; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() < 0.85 ? Math.random() * 0.8 + 0.2 : Math.random() * 1.5 + 0.8,
      baseAlpha: Math.random() * 0.35 + 0.08,
      twinkleSpeed: Math.random() * 0.008 + 0.002,
      twinkleOffset: Math.random() * Math.PI * 2,
    });
  }
}

// ── Trail particles ──
// Each particle is a tiny dot that drifts slowly — NOT a burst
const particles = [];
let mouseX = -999, mouseY = -999;
let prevX = -999, prevY = -999;
let hasMoved = false;
let frame = 0;
let spawnTimer = 0;

function spawnParticle(x, y) {
  // Very gentle random drift — slow, calm, upward float
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.9; // mostly upward, slight spread
  const speed = Math.random() * 0.4 + 0.1;
  const size = Math.random() * 1.6 + 0.4; // tiny dots, like real stars

  particles.push({
    x: x + (Math.random() - 0.5) * 6,
    y: y + (Math.random() - 0.5) * 6,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    r: size,
    life: 1,
    decay: Math.random() * 0.008 + 0.004, // long fade — slow and graceful
    twinkle: Math.random() * Math.PI * 2,
  });
}

// Draw a 4-point star cross (two thin lines — like a real star diffraction spike)
function drawStarDot(x, y, r, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;

  // Glow halo
  const g = ctx.createRadialGradient(x, y, 0, x, y, r * 5);
  g.addColorStop(0, `rgba(200,215,255,${(alpha * 0.6).toFixed(3)})`);
  g.addColorStop(0.3, `rgba(200,215,255,${(alpha * 0.15).toFixed(3)})`);
  g.addColorStop(1, 'rgba(200,215,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, r * 5, 0, Math.PI * 2);
  ctx.fill();

  // Core dot
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(240,245,255,${alpha.toFixed(3)})`;
  ctx.fill();

  // Diffraction spikes (subtle cross) only for larger particles
  if (r > 1.1) {
    const spikeLen = r * 5;
    ctx.strokeStyle = `rgba(200,215,255,${(alpha * 0.35).toFixed(3)})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x - spikeLen, y); ctx.lineTo(x + spikeLen, y);
    ctx.moveTo(x, y - spikeLen); ctx.lineTo(x, y + spikeLen);
    ctx.stroke();
  }

  ctx.restore();
}

// Cursor — a 4-pointed star (diamond cross shape)
function drawCursor(x, y) {
  if (x < 0) return;
  const pulse = 1 + Math.sin(frame * 0.05) * 0.1;
  const arm = 14 * pulse;   // length of each arm
  const width = 2.5 * pulse; // half-width of each arm at base

  ctx.save();

  // Soft outer glow
  const g = ctx.createRadialGradient(x, y, 0, x, y, arm * 1.8);
  g.addColorStop(0, 'rgba(200,215,255,0.22)');
  g.addColorStop(1, 'rgba(200,215,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, arm * 1.8, 0, Math.PI * 2);
  ctx.fill();

  // 4-pointed star path — diamond arms
  ctx.beginPath();
  ctx.moveTo(x,         y - arm);   // top tip
  ctx.lineTo(x + width, y - width); // upper-right shoulder
  ctx.lineTo(x + arm,   y);         // right tip
  ctx.lineTo(x + width, y + width); // lower-right shoulder
  ctx.lineTo(x,         y + arm);   // bottom tip
  ctx.lineTo(x - width, y + width); // lower-left shoulder
  ctx.lineTo(x - arm,   y);         // left tip
  ctx.lineTo(x - width, y - width); // upper-left shoulder
  ctx.closePath();

  // Fill with bright white
  ctx.fillStyle = 'rgba(240,248,255,0.95)';
  ctx.fill();

  // Subtle inner highlight core
  ctx.beginPath();
  ctx.arc(x, y, 2.2 * pulse, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  ctx.restore();
}

function loop() {
  frame++;

  // Very gentle fade — keeps trails long and soft
  ctx.fillStyle = 'rgba(3, 3, 14, 0.08)';
  ctx.fillRect(0, 0, W, H);

  // Background stars — gentle twinkle
  const t = frame * 0.012;
  for (const s of bgStars) {
    const a = s.baseAlpha * (0.6 + 0.4 * Math.sin(t / s.twinkleSpeed + s.twinkleOffset));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,230,255,${a.toFixed(3)})`;
    ctx.fill();
  }

  // Trail particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.twinkle += 0.06;

    if (p.life <= 0) { particles.splice(i, 1); continue; }

    // Ease out alpha — slow at end
    const alpha = p.life * p.life;
    const r = p.r * (0.5 + p.life * 0.5);
    drawStarDot(p.x, p.y, r, alpha);
  }

  // Spawn — rate limited, calm
  if (mouseX > 0) {
    spawnTimer++;
    const dx = mouseX - prevX;
    const dy = mouseY - prevY;
    const dist = Math.hypot(dx, dy);

    // Spawn based on distance moved — denser trail
    if (dist > 3) {
      const count = dist > 20 ? 5 : dist > 10 ? 3 : 2;
      for (let s = 0; s < count; s++) spawnParticle(mouseX, mouseY);
      spawnTimer = 0;
    } else if (spawnTimer > 2) {
      // Even on slow movement, keep spawning
      spawnParticle(mouseX, mouseY);
      spawnTimer = 0;
    }
  }

  prevX = mouseX;
  prevY = mouseY;

  drawCursor(mouseX, mouseY);
  requestAnimationFrame(loop);
}

resize();
loop();
window.addEventListener('resize', resize);

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (!hasMoved) {
    hasMoved = true;
    hint.style.opacity = '0';
  }
}, { passive: true });

document.addEventListener('mouseleave', () => {
  mouseX = -999; mouseY = -999;
  prevX = -999; prevY = -999;
});
</script>
</body>
</html>
